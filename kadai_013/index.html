<!DOCTYPE html>
<html>
    <head>
        <title>課題013 </title>
        <meta charset="UTF-8">
        <meta name="description" content="自家焙煎コーヒーがお家で楽しめるOrganic Cafe">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <a href="index.html" id="logo"><img src="image/logo.png" alt="トップページに戻る"></a>

            <!-- PC用 -->
            <nav id="nav-pc">
                <a href="index.html#concept">CONCEPT</a>
                <a href="index.html#product">PRODUCT</a>
                <a href="index.html#contact">CONTACT</a>
            </nav>
            <!-- スマホ用 -->
             <button id="menu-sp" onclick="document.getElementById('nav-sp').style.display = 'block'">
                <img src="image/button-menu.png" alt="ナビゲーションを開く">
             </button>
             <div id="nav-sp">
                <button id="close" onclick="document.getElementById('nav-sp').style.display = 'none'">
                    <img src="image/button-close.png" alt="ナビゲーションを閉じる">
                </button>
                <nav>
                <ul>
                    <li><a id="logo-sp" href="index.html" onclick="document.getElementById('nav-sp').style.display = 'none'"><img src="image/logo-sp.png" alt="トップページに戻る"></a></li>
                    <li><a class="menu" href="index.html#concept" onclick="document.getElementById('nav-sp').style.display = 'none'">CONCEPT</a></li>
                    <li><a class="menu" href="index.html#product" onclick="document.getElementById('nav-sp').style.display = 'none'">PRODUCT</a></li>
                    <li><a class="menu" href="index.html#contact" onclick="document.getElementById('nav-sp').style.display = 'none'">CONTACT</a></li>
                </ul>
             </nav>
        </header>
        
        <main>
            <article>
                <section id="main-visual">
                    <div id="main-message">
                        <h1>Organic Cafe</h1>
                        <p>自家焙煎コーヒーが買えるお店</p>
                    </div>
                    <img src="image/main-image.jpg" alt="コーヒーを淹れる手元">
                </section>
            </article>
        </main>
    </body>
</html>
